# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Our solution is an LLM-assisted candidate ranking system combining job
  description understanding with multi-signal candidate evaluation and
  explainable ranking. Job descriptions are parsed using Llama 3.1 via the
  Groq API, extracting structured requirements — skills, role, seniority,
  and domain expertise — while filtering out vague terms.
 
  Each candidate is evaluated across five dimensions: Technical (skills, ML
  and retrieval expertise, leadership indicators), Behavioral (recruiter
  response rate, interview completion, open-to-work status), Logistics
  (notice period, availability), Career (experience, role, industry,
  progression), and Risk (honeypot detection, title-experience mismatches,
  consulting-only profiles).
 
  The final score combines these signals with a JD-match score, applying
  soft penalties for risk indicators rather than hard filtering, preserving
  candidate diversity. A fallback chain (LLM parsing -> keyword extraction
  -> role-to-skill mapping -> general ranking) ensures graceful degradation.
  Every result includes a recruiter-readable explanation based solely on
  computed features. Evaluated on 61,579 candidates after processing;
  end-to-end response time is under one second on CPU, no GPU required.
